name: hermes
description: "Hermes — a personal learning agent (PC + Android) powered by Claude Opus 4.8 with on-device memory."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0                     # Claude API calls
  path_provider: ^2.1.2           # locate on-device storage dir
  flutter_secure_storage: ^9.2.2  # encrypted API-key storage
  flutter_local_notifications: ^17.2.2  # pop-ups / notifications
  # flutter_tts disabled for now — needs extra native setup on Windows desktop.
  # Re-add (most easily for Android) to restore the spoken voice:
  # flutter_tts: ^4.0.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  image_path: assets/icon/app_icon.png
  android: true
  ios: false
  windows:
    generate: true
    image_path: assets/icon/app_icon.png
    icon_size: 256

# NOTE: version constraints are sensible defaults. After downloading, run
#   flutter pub get
# and if anything fails to resolve, run
#   flutter pub upgrade
